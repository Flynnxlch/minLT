# Konfigurasi Nginx untuk MinLT (risk.appsdev.my.id)
# Paste isi server { } ke aaPanel: Website → risk.appsdev.my.id → Settings → Configuration

server {
    listen 80;
    server_name risk.appsdev.my.id;
    index index.html index.htm default.html;
    root /www/wwwroot/minLT/dist;

    # SSL (aaPanel): aktifkan setelah pakai Let's Encrypt dll.
    #include /www/server/panel/vhost/nginx/extension/risk.appsdev.my.id/*.conf;

    # Error pages (sesuaikan path kalau aaPanel pakai ini)
    #error_page 404 /404.html;
    #error_page 502 /502.html;

    # SPA + API: batas upload
    client_max_body_size 10M;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # --- PENTING: API ke backend (harus ada agar login tidak "Unexpected token '<'" ) ---
    location /api {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_set_header Accept-Encoding "";
    }

    # Health check backend
    location /health {
        proxy_pass http://127.0.0.1:3001/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # --- SPA: supaya refresh / back / next di /dashboard, /risks, dll tidak 404 ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Forbidden files or directories
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md) {
        return 404;
    }

    # Certificate verification
    location ~ \.well-known {
        allow all;
    }

    # Static assets – cache
    location ~* \.(gif|jpg|jpeg|png|bmp|swf|ico|svg|webp)$ {
        expires 30d;
        access_log off;
        error_log /dev/null;
    }

    location ~* \.(js|css|woff|woff2|ttf|eot)$ {
        expires 12h;
        access_log off;
        error_log /dev/null;
    }

    access_log  /www/wwwlogs/risk.appsdev.my.id.log;
    error_log   /www/wwwlogs/risk.appsdev.my.id.error.log;
}
